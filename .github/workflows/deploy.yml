name: Deploy automatico

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 161.35.142.196 >> ~/.ssh/known_hosts

      - name: Deploy na VPS
        run: |
          ssh root@161.35.142.196 << 'EOF'
            set -e

            cd /root/vendmaster

            echo "==> Atualizando código"
            git fetch origin main
            git pull --ff-only origin main

            echo "==> Instalando dependências"
            npm ci --omit=dev

            echo "==> Aplicando migrations"
            npm run db:migrate

            echo "==> Reiniciando aplicação"
            pm2 restart server --update-env

            echo "==> Aguardando aplicação estabilizar"
            sleep 8

            echo "==> Conferindo status do PM2"
            pm2 status server

            echo "==> Conferindo resposta do login"
            for tentativa in 1 2 3 4 5; do
              if curl -fsS --max-time 20 https://vendmaster.com.br/login > /dev/null; then
                echo "Login respondeu com sucesso na tentativa ${tentativa}"
                break
              fi

              if [ "$tentativa" -eq 5 ]; then
                echo "A página de login não respondeu após 5 tentativas"
                exit 1
              fi

              echo "Login ainda não respondeu. Nova tentativa em 8 segundos..."
              sleep 8
            done

            echo "Deploy concluído com sucesso"
          EOF