name: Deploy automático

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 161.35.142.196 >> ~/.ssh/known_hosts

      - name: 🚀 Deploy na VPS
        run: |
          ssh root@161.35.142.196 << 'EOF'
            cd /root/st_project
            git pull origin main
            npm install
            pm2 restart all
          EOF
